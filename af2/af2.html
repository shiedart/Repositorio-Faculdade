<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="af2estilo.css">
    <script src="jsaf2.js"></script>
    <title>Avaliação Formadora 2</title>
</head>
<body>
    <header>
        <h1>Avaliação Formadora II: Criação de um Sistema de Cadastro de Usuários</h1>
    </header>
    <main>
        <form>
            <label for="nomec">Nome Completo:</label>
            <input type="text" id="nomec" name="nomec" required>

            <label for="email">E-mail:</label>
            <input type="email" id="email" name="email" required placeholder="@gmail.com">

            <label for="dnasc">Data de Nascimento:</label>
            <input type="date" name="dnasc" id="dnasc" required>

            <label for="genero">Gênero:</label>
            <select name="genero" id="genero" required>
                <option value="" disabled selected>Selecione uma Opção</option>
                <option value="cis">Cisgênero</option>
                <option value="trans">Transgênero/Transexual</option>
                <option value="nb">Não-binário</option>
                <option value="gf">Gênero Fluido</option>
                <option value="agenero">Agênero</option>
                <option value="outros">Outros</option>
            </select>

            <label for="senha">Senha:</label>
            <input type="password" name="senha" id="senha" minlength="6" required>

            <label for="consenha">Confirme a senha:</label>
            <input type="password" name="consenha" id="consenha" minlength="6" required>

            <button type="submit">Cadastrar</button>
        </form>
    <main>

    <footer>
        <p>Feito por Cauã Felipe</p>
    </footer>
</body>
</html>
